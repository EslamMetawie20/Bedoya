name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

environment:
  name: github-pages
  url: https://eslammetawie20.github.io/Bedoya/

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build, Lint & Deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Run linter (oxlint)
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3

  report:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Show deployment URL
        run: echo "✅ Site deployed to ${{ steps.deployment.outputs.page_url }}"
